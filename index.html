<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Things With AI</title>
    <style>
        /* CSS Variables for Light/Dark themes */
        :root {
            --bg-color: #fdfdfd;
            --text-color: #1a1a1a;
            --text-muted: #4a4a4a;
            --btn-bg: #e0e0e0;
            --btn-hover: #d0d0d0;
            --btn-shadow: rgba(0, 0, 0, 0.1);
        }

        /* Default to dark mode if system prefers it */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #f0f0f0;
                --text-muted: #a0a0a0;
                --btn-bg: #2a2a2a;
                --btn-hover: #3a3a3a;
                --btn-shadow: rgba(0, 0, 0, 0.5);
            }
        }

        /* Override variables when explicitly toggled */
        html[data-theme="light"] {
            --bg-color: #fdfdfd;
            --text-color: #1a1a1a;
            --text-muted: #4a4a4a;
            --btn-bg: #e0e0e0;
            --btn-hover: #d0d0d0;
            --btn-shadow: rgba(0, 0, 0, 0.1);
        }

        html[data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #f0f0f0;
            --text-muted: #a0a0a0;
            --btn-bg: #2a2a2a;
            --btn-hover: #3a3a3a;
            --btn-shadow: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        main {
            max-width: 600px;
            padding: 2rem;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            font-size: 3rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        ul {
            font-size: 1.25rem;
            line-height: 1.6;
            color: var(--text-muted);
            padding-left: 1.5rem;
            margin-bottom: 3rem;
        }

        li {
            margin-bottom: 1rem;
        }

        footer {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: left;
            margin-top: 2rem;
        }

        #theme-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--btn-bg);
            color: var(--text-color);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 10px var(--btn-shadow);
            transition: background-color 0.2s, transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #theme-toggle:hover {
            background-color: var(--btn-hover);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <main>
        <h1>Make Things With AI</h1>
        <ul>
            <li>12 projects to introduce you to the best AI tools for making art, music, and games</li>
            <li>learn design, programming, debugging concepts</li>
            <li>have fun</li>
        </ul>
        
        <footer>
            &copy; 2026 GameLeaf, Inc.
        </footer>
    </main>

    <button id="theme-toggle" aria-label="Toggle Theme" title="Toggle Light/Dark Theme">
        🌓
    </button>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)");

        // Apply theme and update icon
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            toggleBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        // Check local storage or fallback to system preference
        function getInitialTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) return savedTheme;
            return systemPrefersDark.matches ? 'dark' : 'light';
        }

        // Initialize theme
        let currentTheme = getInitialTheme();
        applyTheme(currentTheme);

        // Listen for toggle clicks
        toggleBtn.addEventListener('click', () => {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            applyTheme(currentTheme);
            localStorage.setItem('theme', currentTheme);
        });

        // Listen for system theme changes if the user hasn't manually overridden yet
        systemPrefersDark.addEventListener('change', (e) => {
            if (!localStorage.getItem('theme')) {
                currentTheme = e.matches ? 'dark' : 'light';
                applyTheme(currentTheme);
            }
        });
    </script>

</body>
</html>
