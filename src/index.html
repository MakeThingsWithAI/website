<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Make Things With AI</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #17151b;
                --bg-soft: #1e1c24;
                --text: #ede8e0;
                --text-dim: #8a8590;
                --accent: #ffb454;
                --rule: #322f3a;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html,
            body {
                height: 100%;
            }

            body {
                background: var(--bg);
                background-image:
                    radial-gradient(circle at 20% 15%, rgba(255, 180, 84, 0.05), transparent 40%),
                    radial-gradient(circle at 85% 80%, rgba(255, 180, 84, 0.04), transparent 45%);
                color: var(--text);
                font-family: "IBM Plex Mono", monospace;
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }

            main {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 6vh 6vw;
            }

            .hero {
                text-align: center;
                max-width: 900px;
            }

            h1 {
                font-family: "Fraunces", serif;
                font-optical-sizing: auto;
                font-weight: 600;
                font-size: clamp(2.4rem, 7vw, 5.5rem);
                line-height: 1.05;
                letter-spacing: -0.01em;
            }

            h1 .with {
                font-style: italic;
                font-weight: 500;
                color: var(--accent);
            }

            footer {
                text-align: center;
                padding: 2rem 1rem;
                font-size: 0.75rem;
                color: var(--text-dim);
                border-top: 1px solid var(--rule);
            }

            a:focus-visible,
            button:focus-visible {
                outline: 2px solid var(--accent);
                outline-offset: 3px;
            }
        </style>
    </head>
    <body>
        <main>
            <div class="hero">
                <h1>Make Things<br /><span class="with">With AI</span></h1>
            </div>
        </main>

        <footer>Copyright © GameLeaf, 2026</footer>
    </body>
</html>
